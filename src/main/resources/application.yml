server:
  port: 8081

spring:
  application:
    name: auth-service
  data:
    mongodb:
      host: ${MONGO_HOST:localhost}
      port: ${MONGO_PORT:27017}
      database: auth_db

# Configuration du token
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://frontend-service:3000}

auth:
  token:
    expiration-hours: 1
    # Clé secrète AES (16 caractères minimum)
    secret-key: ${TOKEN_SECRET_KEY:WadGachaSecret16}
